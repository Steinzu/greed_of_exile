name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build and release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: greedofexile.exe
            asset_name: greedofexile-windows-x64.exe
          - os: ubuntu-22.04
            artifact_name: greedofexile
            asset_name: greedofexile-linux-x86_64.AppImage

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows Setup
      - name: Install NASM (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Linux Setup: Dependencies for eframe/egui (graphics & windowing)
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm libwayland-dev libxkbcommon-dev libegl1-mesa-dev libgbm-dev libgl1-mesa-dev libx11-dev libasound2-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

      # AppImage Packaging Step (Linux Only)
      - name: Create AppImage
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # Download linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Create the Desktop Entry
          cat <<EOF > greedofexile.desktop
          [Desktop Entry]
          Type=Application
          Name=Greed Of Exile
          Exec=greedofexile
          Icon=logo
          Categories=Utility;
          EOF

          # Run linuxdeploy
          # We use --appimage-extract-and-run because GitHub runners don't support FUSE
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e target/release/greedofexile \
            -i logo.png \
            -d greedofexile.desktop \
            --output appimage

          mkdir -p assets
          mv Greed_Of_Exile*.AppImage assets/${{ matrix.asset_name }}

      # Prepare Windows Binary
      - name: Prepare Windows Binary
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p assets
          cp target/release/${{ matrix.artifact_name }} assets/${{ matrix.asset_name }}

      # Upload to GitHub Releases
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
